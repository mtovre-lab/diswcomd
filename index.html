<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Pro Voice & Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
</head>
<body>

    <div class="discord-app">
        
        <div class="servers-sidebar">
            <div class="server-wrapper">
                <div class="server-pill active-pill"></div>
                <div class="server-icon discord-logo active"><i class="fa-brands fa-discord"></i></div>
            </div>
            <div class="server-separator"></div>
            <div class="server-wrapper"><div class="server-pill"></div><div class="server-icon text-icon">D</div></div>
            <div class="server-wrapper"><div class="server-pill"></div><div class="server-icon text-icon">FP</div></div>
            <div class="server-icon add-server"><i class="fa-solid fa-plus"></i></div>
        </div>

        <div class="channels-sidebar" id="sidebar">
            <div class="server-name">
                <span>سيرفر الأصدقاء ✨</span>
                <i class="fa-solid fa-xmark close-menu-btn" id="close-sidebar-btn"></i>
            </div>
            
            <div class="channels-category"><span>القنوات</span></div>
            <div class="channels-list">
                <div class="channel-item active" id="btn-channel-general">
                    <i class="fa-solid fa-hashtag channel-icon"></i>
                    <span>عام</span>
                </div>
                <div class="channel-item" id="btn-channel-voice">
                    <i class="fa-solid fa-volume-high channel-icon"></i>
                    <span>روم_المايك</span>
                </div>
                <div class="voice-users-list" id="voice-users-container"></div>
            </div>

            <div class="channels-category"><span>عقد الصداقة للابد 👥</span></div>
            <div class="friends-permanent-list" id="friends-list-container"></div>

            <div class="voice-panel">
                <div class="voice-main-controls">
                    <div class="status-container">
                        <div class="status-dot" id="status-led"></div>
                        <span id="status">خارج الروم</span>
                    </div>
                    
                    <div class="my-id-section">
                        <label>كود الاتصال الحالي:</label>
                        <div id="my-id" class="id-badge" title="اضغط للنسخ السريع">جاري جلب الكود...</div>
                    </div>

                    <div id="add-friend-zone" class="add-friend-inputs">
                        <input type="text" id="peer-id-input" placeholder="حط كود صاحبك الجديد هنا...">
                        <input type="text" id="friend-name-input" placeholder="سمية صاحبك الجديد...">
                        <button id="call-btn" class="btn-primary">عقد الصداقة وبدء الروم</button>
                    </div>
                    
                    <button id="hangup-btn" class="btn-danger hidden-element">مغادرة الروم الصوتي</button>
                </div>

                <div class="voice-buttons-sidebar">
                    <button id="mute-btn" class="unmuted" title="كتم المايك"><i id="mute-icon" class="fa-solid fa-microphone"></i></button>
                    <button id="deafen-btn" class="undeafened" title="كتم السمع"><i id="deafen-icon" class="fa-solid fa-headphones"></i></button>
                </div>
            </div>
        </div>

        <div class="main-content">
            
            <div class="top-bar">
                <div class="top-bar-left">
                    <i class="fa-solid fa-bars menu-hamburger-btn" id="open-sidebar-btn"></i>
                    <i class="fa-solid fa-hashtag header-hashtag"></i>
                    <span id="current-channel-title">عام</span>
                </div>
                
                <div class="top-bar-right">
                    <div id="user-profile-card" class="profile-card" title="كليكي هنا لنسخ كودك السري">
                        <span id="user-display-top" class="profile-name">👤 جاري التحميل...</span>
                        <span id="user-code-top" class="profile-code">🔑 الكود: جاري الجلب...</span>
                    </div>
                    
                    <button id="switch-account-btn" class="btn-secondary">
                        <i class="fa-solid fa-rotate"></i> تبديل الحساب
                    </button>
                </div>
            </div>

            <div class="chat-container" id="text-chat-view">
                <div class="messages-view" id="chat-box"></div>

                <div class="chat-input-wrapper">
                    <div class="input-container">
                        <i class="fa-solid fa-circle-plus input-icon-plus"></i>
                        <input type="text" id="message-input" placeholder="اكتب رسالة في #عام...">
                    </div>
                    <button id="send-btn" class="btn-send">إرسال</button>
                </div>
            </div>

            <div class="chat-container hidden-element" id="voice-room-view">
                <div class="voice-grid-container" id="voice-grid"></div>
            </div>

        </div>

    </div>

    <audio id="remote-audio" autoplay></audio>
    <script src="script.js"></script>
</body>
</html>
