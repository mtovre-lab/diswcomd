<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Clone - Voice Grid</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <div class="discord-app">
        
        <!-- 1. بار السيرفرات -->
        <div class="servers-sidebar">
            <div class="server-wrapper">
                <div class="server-pill active-pill"></div>
                <div class="server-icon discord-logo active"><i class="fa-brands fa-discord"></i></div>
            </div>
            <div class="server-separator"></div>
            <div class="server-wrapper"><div class="server-pill"></div><div class="server-icon text-icon">D</div></div>
            <div class="server-wrapper"><div class="server-pill"></div><div class="server-icon text-icon">FP</div></div>
            <div class="server-icon add-server"><i class="fa-solid fa-plus"></i></div>
        </div>

        <!-- 2. بار القنوات والتحكم بالصوت -->
        <div class="channels-sidebar">
            <div class="server-name">
                <span>سيرفر الأصدقاء ✨</span>
                <i class="fa-solid fa-chevron-down"></i>
            </div>
            
            <div class="channels-category"><span>القنوات</span></div>
            <div class="channels-list">
                <div class="channel-item active" id="btn-channel-general">
                    <i class="fa-solid fa-hashtag channel-icon"></i>
                    <span>عام</span>
                </div>
                <div class="channel-item" id="btn-channel-voice">
                    <i class="fa-solid fa-volume-high channel-icon"></i>
                    <span>روم_المايك</span>
                </div>
                
                <!-- قائمة الأسماء الصغيرة تحت القناة -->
                <div class="voice-users-list" id="voice-users-container"></div>
            </div>

            <!-- لوحة التحكم الصوتية -->
            <div class="voice-panel">
                <div class="voice-main-controls">
                    <div class="status-container">
                        <div class="status-dot" id="status-led"></div>
                        <span id="status">جاري تشغيل النظام...</span>
                    </div>
                    
                    <div class="my-id-section">
                        <label>الكود ديالك:</label>
                        <div id="my-id" class="id-badge" title="اضغط للنسخ">جاري جلب الكود...</div>
                    </div>

                    <input type="text" id="peer-id-input" placeholder="حط كود صاحبك هنا...">
                    <div class="action-buttons" style="display: flex; gap: 4px; width: 100%;">
                        <button id="call-btn" style="flex: 1;">اتصال</button>
                        <button id="hangup-btn" class="hidden-btn" title="قطع الاتصال" style="background-color: #f23f43;"><i class="fa-solid fa-phone-slash"></i></button>
                    </div>
                </div>

                <div class="voice-buttons-sidebar">
                    <button id="mute-btn" class="unmuted" title="كتم المايك"><i id="mute-icon" class="fa-solid fa-microphone"></i></button>
                    <button id="deafen-btn" class="undeafened" title="كتم السمع"><i id="deafen-icon" class="fa-solid fa-headphones"></i></button>
                    <button class="settings-btn"><i class="fa-solid fa-gear"></i></button>
                </div>
            </div>
        </div>

        <!-- 3. منطقة الشات الكتابي -->
        <div class="chat-container" id="text-chat-view">
            <div class="chat-header">
                <i class="fa-solid fa-hashtag header-icon"></i>
                <span class="header-title">عام</span>
                <div class="header-divider"></div>
                <span class="header-desc">مرحباً بك في الشات الكتابي العام</span>
            </div>
            
            <div class="messages-view" id="chat-box"></div>

            <div class="chat-input-wrapper">
                <div class="input-container">
                    <i class="fa-solid fa-circle-plus input-icon-plus"></i>
                    <input type="text" id="message-input" placeholder="اكتب رسالة في #عام...">
                </div>
                <button id="send-btn">إرسال</button>
            </div>
        </div>

        <!-- 4. منطقة الروم الصوتي (المربعات الكبار المحدثة) -->
        <div class="chat-container" id="voice-room-view" style="display: none;">
            <div class="chat-header">
                <i class="fa-solid fa-volume-high header-icon"></i>
                <span class="header-title">روم_المايك</span>
                <div class="header-divider"></div>
                <span class="header-desc">المتحدثون ف الروم الحالي</span>
            </div>
            
            <!-- شبكة المربعات الكبار (Voice Grid) -->
            <div class="voice-grid-container" id="voice-grid">
                <!-- المربعات غاتقاد وتتحذف هنا تلقائياً بالجافا سكريبت -->
            </div>
        </div>

    </div>

    <audio id="remote-audio" autoplay></audio>
    <script src="script.js"></script>
</body>
</html>
